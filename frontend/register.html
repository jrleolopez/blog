<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Mi Blog</title>
  <!-- Bootstrap solo para estructura -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tus estilos personalizados -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg custom-navbar mb-4">
    <div class="container">
      <a class="navbar-brand" href="index.html">Mi Blog</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul id="navLinks" class="navbar-nav ms-auto"></ul>
      </div>
    </div>
  </nav>

  <!-- Formulario Registro -->
  <main class="container d-flex justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm register-card">
        <div class="card-header custom-card-header">
          <h4 class="mb-0">Crear cuenta</h4>
        </div>
        <div class="card-body">
          <form id="registerForm">
            <div class="mb-3">
              <label for="username" class="form-label">Usuario</label>
              <input type="text" id="username" class="form-control" placeholder="Elige un usuario" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" id="password" class="form-control" placeholder="Elige una contraseña" required>
            </div>
            <button type="submit" class="btn btn-form w-100">Registrarse</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="custom-footer mt-5">
    <p class="mb-0">&copy; 2026 Mi Blog - Desarrollado por Leonardo</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
