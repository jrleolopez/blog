<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Posts - Mi Blog</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="index.html">Mi Blog</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul id="navLinks" class="navbar-nav ms-auto"></ul>
      </div>
    </div>
  </nav>
    <!-- Contenido principal -->
    <main class="d-flex flex-column justify-content-center align-items-center min-vh-100">
      <div class="w-100" style="max-width: 500px; margin: auto">
        <h2 class="mb-3 text-primary text-center">Crear nuevo post</h2>
        <!-- Formulario centrado -->
        <form id="postForm" class="card shadow-sm p-4">
          <div class="mb-3">
            <input
              type="text"
              id="title"
              class="form-control"
              placeholder="Título"
              required
            />
          </div>
          <div class="mb-3">
            <textarea
              id="content"
              class="form-control"
              placeholder="Contenido"
              rows="4"
              required
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Publicar</button>
        </form>
      </div>
    </main>
    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-auto">
      <small>&copy; 2026 Mi Blog - Desarrollado por Leonardo</small>
    </footer>
    <!-- Script principal -->
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
