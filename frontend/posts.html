<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Posts - Mi Blog</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="index.html">Mi Blog</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul id="navLinks" class="navbar-nav ms-auto"></ul>
      </div>
    </div>
  </nav>
    <!-- Contenido principal -->
<main class="container d-flex justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <!-- Header -->
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0 text-center">Crear nuevo post</h4>
      </div>
      <!-- Body -->
      <div class="card-body">
        <form id="postForm">
          <div class="mb-3">
            <label for="title" class="form-label">Título</label>
            <input
              type="text"
              id="title"
              class="form-control"
              placeholder="Título"
              required
            />
          </div>
          <div class="mb-3">
            <label for="content" class="form-label">Contenido</label>
            <textarea
              id="content"
              class="form-control"
              placeholder="Contenido"
              rows="4"
              required
            ></textarea>
          </div>
          <button type="submit" class="btn btn-success w-100">Publicar</button>
        </form>
      </div>
    </div>
  </div>
</main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-auto">
      <small>&copy; 2026 Mi Blog - Desarrollado por Leonardo</small>
    </footer>
    <!-- Script principal -->
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
