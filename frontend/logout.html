<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Logout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-sm text-center" style="max-width: 400px;">
    <div class="card-body">
      <h3 class="card-title mb-3">Cerrar sesión</h3>
      <p class="mb-4">¿Seguro que quieres salir de tu cuenta?</p>
      <button id="logoutBtn" class="btn btn-danger w-100">Salir</button>
    </div>
  </div>

  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      alert("Has cerrado sesión correctamente");
      window.location.href = "login.html";
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
