<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="custom-navbar mb-4">
    <div class="container">
      <a class="navbar-brand" href="index.html">Mi Blog</a>
      <div id="menu-toggle" class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="menu" class="navbar-collapse">
        <ul id="navLinks" class="navbar-nav"></ul>
      </div>
    </div>
  </nav>

  <main class="container d-flex justify-content-center">
    <div class="card shadow-sm login-card">
      <div class="card-header custom-card-header">
        <h4 class="mb-0">Iniciar sesión</h4>
      </div>
      <div class="card-body">
        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" id="username" class="form-control" placeholder="Tu usuario" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="Tu contraseña" required>
          </div>
          <button type="submit" class="btn btn-form w-100">Ingresar</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="custom-footer mt-5">
    <p class="mb-0">&copy; 2026 Mi Blog - Desarrollado por Leonardo</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
