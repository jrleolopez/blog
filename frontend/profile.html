<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="custom-navbar mb-4">
    <div class="container">
      <a class="navbar-brand" href="index.html">Mi Blog</a>
      <div id="menu-toggle" class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="menu" class="navbar-collapse">
        <ul id="navLinks" class="navbar-nav"></ul>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm mb-4">
          <div class="card-body text-center" id="profile"></div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header custom-card-header">
            <h4 class="mb-0">Editar perfil</h4>
          </div>
          <div class="card-body">
            <form id="editProfileForm" enctype="multipart/form-data">
              <div class="mb-3">
                <label for="bio" class="form-label">Biografía</label>
                <textarea id="bio" name="bio" class="form-control" rows="3"></textarea>
              </div>
              <div class="mb-3">
                <label for="avatar" class="form-label">Subir Avatar</label>
                <input type="file" id="avatar" name="avatar" class="form-control" accept="image/*" />
              </div>
              <button type="submit" class="btn btn-form">Actualizar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="custom-footer mt-5">
    <p class="mb-0">&copy; 2026 Mi Blog - Desarrollado por Leonardo</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
